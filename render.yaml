services:
  - type: web
    name: dg-alephusta-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 3000
      - key: AI_API_KEY
        sync: false # You will set this manually in Render dashboard for security
